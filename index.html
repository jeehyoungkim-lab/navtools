<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>내 홈페이지</title>
    <style>
        /* HTML <details> 태그를 활용한 간단한 아코디언 스타일 */
        details { margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        summary { padding: 15px; background-color: #f8f9fa; cursor: pointer; font-weight: bold; }
        .content { padding: 15px; }
    </style>
</head>
<body>
    <h1>나의 작은 홈페이지</h1>
    <details><summary>첫 번째 글 상자</summary><div class="content">내용입니다.</div></details>
</body>
</html>
